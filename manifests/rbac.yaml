apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: secret-reader
  namespace: secure-lab
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: secret-reader-binding
  namespace: secure-lab
subjects:
  - kind: ServiceAccount
    name: default
    namespace: secure-lab
roleRef:
  kind: Role
  name: secret-reader
  apiGroup: rbac.authorization.k8s.io
